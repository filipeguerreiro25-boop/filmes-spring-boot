<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lista de Filmes</title>

        <style>

            body.dark {
                background-color: #222;
                color: white;
            }

            body.dark a {
                color: #66ccff;
            }

        </style>
    </head>
    <body>

        <button onclick="trocarTema()">
            Alternar Tema
        </button><!-- Botão de tema -->

        <h1>Filmes Cadastrados</h1>

        <a href="/cadastro">Cadastrar Filme</a>

        <hr>

        <ul>
            <li th:each="filme : ${filmes}">

                <span th:text="${filme.titulo}"></span>

                <a th:href="@{/detalhes/{id}(id=${filme.id})}">
                    Ver detalhes
                </a>
                <button th:attr="data-id=${filme.id}" class="btnExcluir">
                    Excluir
                </button>
                <a th:href="@{/editar/{id}(id=${filme.id})}">
                    Editar
                </a>
            </li>
        </ul>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="/js/filmes.js"></script>

        <script>

            function trocarTema() {

                document.body.classList.toggle("dark");

                if (document.body.classList.contains("dark")) {

                    document.cookie = "tema=dark; path=/";

                } else {

                    document.cookie = "tema=light; path=/";
                }
            }

            window.onload = function () {

                if (document.cookie.includes("tema=dark")) {

                    document.body.classList.add("dark");
                }
            }

        </script>

    </body>
</html>
