<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Detalhes</title>

        <title>Lista de Filmes</title>

        <style>

            body.dark {
                background-color: #222;
                color: white;
            }

            body.dark a {
                color: #66ccff;
            }

        </style>
    </head>
    <body>

        <h1 th:text="${filme.titulo}"></h1>

        <p>
            <strong>Sinopse:</strong>
            <span th:text="${filme.sinopse}"></span>
        </p>

        <p>
            <strong>Gênero:</strong>
            <span th:text="${filme.genero}"></span>
        </p>

        <p>
            <strong>Ano:</strong>
            <span th:text="${filme.anoLancamento}"></span>
        </p>

        <hr>

        <h2>Análises</h2>

        <ul>
            <li th:each="analise : ${filme.analises}">

                <strong>Nota:</strong>
                <span th:text="${analise.nota}"></span>

                <br>

                <span th:text="${analise.analise}"></span>

            </li>
        </ul>

        <hr>

        <h2>Adicionar análise</h2>

        <form th:action="@{/analise/{id}(id=${filme.id})}"
              method="post">

            <label>Análise:</label>
            <textarea name="analise"></textarea>

            <br><br>

            <label>Nota:</label>
            <input type="number" name="nota">

            <br><br>

            <button type="submit">Enviar</button>

        </form>

        <script>

            function trocarTema() {

                document.body.classList.toggle("dark");

                if (document.body.classList.contains("dark")) {

                    document.cookie = "tema=dark; path=/";

                } else {

                    document.cookie = "tema=light; path=/";
                }
            }

            window.onload = function () {

                if (document.cookie.includes("tema=dark")) {

                    document.body.classList.add("dark");
                }
            }

        </script>
    </body>
</html>
